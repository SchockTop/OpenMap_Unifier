<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMap Unifier</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1 class="title">OpenMap Unifier</h1>

        <!-- Card 1: KML Processor -->
        <div class="card">
            <h2><i class="fa-solid fa-map"></i> Polygon Extraction</h2>
            <p style="color: var(--text-secondary)">Process <code>googleearth.xml</code> to get EWKT Polygon.</p>
            
            <div class="drop-zone" id="kmlDropZone">
                <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
                <span>Drag & Drop KML/XML here</span>
                <input type="file" id="kmlInput" accept=".xml,.kml" hidden>
            </div>

            <textarea id="polygonOutput" placeholder="Extracted Polygon (EWKT) will appear here..."></textarea>
            
            <button id="copyPolygonBtn"><i class="fa-regular fa-copy"></i> Copy to Clipboard</button>
        </div>

        <!-- Card 2: Downloaders -->
        <div class="card">
            <h2><i class="fa-solid fa-download"></i> Data Downloader</h2>
            
            <!-- Metalink Section -->
            <div style="border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h3>Mass Data (Metalink)</h3>
                <div class="drop-zone" id="metaDropZone" style="padding: 1rem; margin-top: 0.5rem;">
                    <i class="fa-solid fa-file-code drop-icon" style="font-size: 1.5rem;"></i>
                    <span>Drop .meta4 file here</span>
                    <input type="file" id="metaInput" accept=".meta4" hidden>
                </div>
            </div>

            <!-- Relief Section -->
            <div>
                <h3>Height Data (Relief)</h3>
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Uses the Polygon extracted on the left.</p>
                <button id="downloadReliefBtn" type="button"><i class="fa-solid fa-mountain-sun"></i> Start Relief Download</button>
            </div>
        </div>

        <!-- Status Panel -->
        <div class="card status-panel">
            <h2><i class="fa-solid fa-list-check"></i> Process Status</h2>
            <div class="progress-container" id="progressList">
                <!-- Progress items will be injected here -->
                <div style="text-align: center; color: var(--text-secondary); margin-top: 2rem;">
                    No active processes...
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
