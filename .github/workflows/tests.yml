name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # customtkinter needs a Tcl/Tk system package but the tests import
        # only backend.* so we skip it. Everything tests/ exercises is
        # already pulled in by requirements.txt (shapely, pyproj, requests).
        run: |
          python -m pip install --upgrade pip
          python -m pip install shapely pyproj requests
          python -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -v
